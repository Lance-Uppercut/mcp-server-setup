spring.application.name=tado-mcp
spring.ai.mcp.server.name=tado
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse.enabled=true
spring.ai.mcp.server.sse.message-endpoint=/mcp/sse
server.port=8080
tado.tokens.file=/data/tokens.json
tado.token-refresh-interval-ms=1800000
tado.token-refresh-initial-delay-ms=60000
