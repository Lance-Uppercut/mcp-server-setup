services:
  # OpenCode CLI (MCP Client)
  opencode:
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - JENKINS_URL=${JENKINS_URL:-}
      - JENKINS_USERNAME=${JENKINS_USERNAME:-}
      - JENKINS_API_TOKEN=${JENKINS_API_TOKEN:-}
      - TODOIST_API_TOKEN=${TODOIST_API_TOKEN:-}
      - YAHOO_EMAIL=${YAHOO_EMAIL:-}
      - YAHOO_APP_PASSWORD=${YAHOO_APP_PASSWORD:-}
    build:
      context: ./opencode
      dockerfile: Dockerfile
    container_name: opencode
    volumes:
      - ./opencode/config:/root/.config/opencode
      - ./opencode/data:/root/.local/share/opencode
      - ./opencode/codex:/root/.codex
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    profiles:
      - opencode
    networks:
      - mcp-network

  # Yahoo Mail MCP Server (SSE mode)
  yahoo-mail-mcp:
    image: registry:5000/offbeat-iot/yahoo-mail-mcp-server:latest
    container_name: yahoo-mail-mcp
    environment:
      - YAHOO_EMAIL=${YAHOO_EMAIL}
      - YAHOO_APP_PASSWORD=${YAHOO_APP_PASSWORD}
      - TRANSPORT_MODE=sse
      - PORT=3101
    ports:
      - "3101:3101"
    networks:
      - mcp-network

  # Alertmanager MCP Server (SSE mode)
  alertmanager-mcp:
    image: ghcr.io/ntk148v/alertmanager-mcp-server:latest
    container_name: alertmanager-mcp
    environment:
      - ALERTMANAGER_URL=${ALERTMANAGER_URL}
      - ALERTMANAGER_USERNAME=${ALERTMANAGER_USERNAME:-}
      - ALERTMANAGER_PASSWORD=${ALERTMANAGER_PASSWORD:-}
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    ports:
      - "8001:8001"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import sys,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8001/sse', timeout=2); sys.exit(0 if r.status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    extra_hosts:
      - "observability1:192.168.1.80"
    networks:
      - mcp-network

  # Google Workspace MCP Server (SSE mode)
  google-workspace-mcp:
    image: registry:5000/offbeat-iot/google-workspace-mcp:latest
    build:
      context: ./servers/mcp-google-workspace
      dockerfile: Dockerfile
    command:
      - node
      - dist/server.js
      - --gauth-file
      - /data/google-workspace/.gauth.json
      - --accounts-file
      - /data/google-workspace/.accounts.json
      - --credentials-dir
      - /data/google-workspace/credentials
    environment:
      - TRANSPORT_MODE=sse
      - PORT=3103
    ports:
      - "3103:3103"
    volumes:
      - ${MCP_DATA_DIR:-./data}/google-workspace:/data/google-workspace
    networks:
      - mcp-network

  # Tado MCP Server (SSE mode)
  tado-mcp:
    image: registry:5000/offbeat-iot/tado-mcp:latest
    container_name: tado-mcp
    build:
      context: ./servers/tado-mcp
      dockerfile: Dockerfile
    environment:
      - SERVER_PORT=3102
      - TADO_TOKENS_FILE=/data/tokens.json
    ports:
      - "3102:3102"
    volumes:
      - ${MCP_DATA_DIR:-./data}/tado:/data
    networks:
      - mcp-network

  # Todoist MCP Server
  todoist-mcp:
    image: registry:5000/offbeat-iot/todoist-mcp:latest
    container_name: todoist-mcp
    build:
      context: ./servers/todoist-mcp
      dockerfile: Dockerfile
    command:
      - python
      - -c
      - from todoist_mcp_server.todoist import mcp; mcp.settings.host='0.0.0.0'; mcp.settings.port=3104; mcp.run(transport='sse')
    environment:
      - TODOIST_API_TOKEN=${TODOIST_API_TOKEN}
    ports:
      - "3104:3104"
    networks:
      - mcp-network

  # ASUS Router MCP Server
  asus-router-mcp:
    image: registry:5000/offbeat-iot/asus-router-mcp:latest
    container_name: asus-router-mcp
    build:
      context: ./servers/asus-router-mcp
      dockerfile: Dockerfile
    environment:
      - ROUTER_HOST=${ROUTER_HOST:-192.168.1.1}
      - ROUTER_USERNAME=${ROUTER_USERNAME:-admin}
      - ROUTER_PASSWORD=${ROUTER_PASSWORD}
      - USE_SSL=${USE_SSL:-true}
      - TRANSPORT_MODE=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3105
    ports:
      - "3105:3105"
    networks:
      - mcp-network

  # Playwright MCP Server
  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: playwright-mcp
    environment:
      - PLAYWRIGHT_MCP_HOST=0.0.0.0
      - PLAYWRIGHT_MCP_PORT=3106
    ports:
      - "3106:3106"
    volumes:
      - ${MCP_DATA_DIR:-./data}/playwright:/home/user
    networks:
      - mcp-network

  # Portainer MCP Servers (stdio transport - use docker compose run --rm portainer-{server})
  portainer-build1:
    image: registry:5000/offbeat-iot/portainer-mcp:latest
    container_name: portainer-build1
    environment:
      - PORTAINER_SERVER=http://build1.home:6500
      - PORTAINER_TOKEN=${PORTAINER_BUILD1_TOKEN}
    extra_hosts:
      - "build1.home:192.168.1.10"
    profiles:
      - portainer
    networks:
      - mcp-network

  portainer-build2:
    image: registry:5000/offbeat-iot/portainer-mcp:latest
    container_name: portainer-build2
    environment:
      - PORTAINER_SERVER=http://build2.home:6500
      - PORTAINER_TOKEN=${PORTAINER_BUILD2_TOKEN}
    extra_hosts:
      - "build2.home:192.168.1.11"
    profiles:
      - portainer
    networks:
      - mcp-network

  portainer-monitor:
    image: registry:5000/offbeat-iot/portainer-mcp:latest
    container_name: portainer-monitor
    environment:
      - PORTAINER_SERVER=http://192.168.1.60:6500
      - PORTAINER_TOKEN=${PORTAINER_MONITOR_TOKEN}
    profiles:
      - portainer
    networks:
      - mcp-network

  portainer-observability1:
    image: registry:5000/offbeat-iot/portainer-mcp:latest
    container_name: portainer-observability1
    environment:
      - PORTAINER_SERVER=http://192.168.1.80:6500
      - PORTAINER_TOKEN=${PORTAINER_OBSERVABILITY1_TOKEN}
    profiles:
      - portainer
    networks:
      - mcp-network

  portainer-tools1:
    image: registry:5000/offbeat-iot/portainer-mcp:latest
    container_name: portainer-tools1
    environment:
      - PORTAINER_SERVER=http://192.168.1.17:6500
      - PORTAINER_TOKEN=${PORTAINER_TOOLS1_TOKEN}
    profiles:
      - portainer
    networks:
      - mcp-network

  portainer-production1:
    image: registry:5000/offbeat-iot/portainer-mcp:latest
    container_name: portainer-production1
    environment:
      - PORTAINER_SERVER=http://192.168.1.85:6500
      - PORTAINER_TOKEN=${PORTAINER_PRODUCTION1_TOKEN}
    profiles:
      - portainer
    networks:
      - mcp-network

networks:
  mcp-network:
    name: sentinel_sentinel-network
    external: true
