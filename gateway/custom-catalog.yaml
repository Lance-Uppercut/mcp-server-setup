registry:
  jenkins:
    dateAdded: "2026-04-23T00:00:00Z"
    title: Jenkins
    description: Jenkins MCP server (remote)
    ref: ""
    source: ""
    type: remote
    tools:
      - name: getBuildLog
      - name: searchBuildLog
      - name: getJobs
      - name: triggerBuild
      - name: updateBuild
      - name: whoAmI
      - name: getStatus
      - name: getJob
      - name: getBuild
      - name: getJobScm
      - name: getBuildScm
      - name: getBuildChangeSets
      - name: getTestResults
    prompts: 0
    resources: {}
    dynamic:
      tools: true
    remote:
      url: http://monitor:8085/mcp-server/sse
      transport_type: sse
      headers:
        Authorization: Basic b3BlbmNvZGU6MTE5YjYwZjA3MDFkYzU3MGY5NTU4M2U3NjZjZDk2OGY5MA==

  portainer_build1:
    dateAdded: "2026-04-23T00:00:00Z"
    title: Portainer Build1
    description: Portainer MCP server for build1
    ref: ""
    source: ""
    type: server
    image: 192.168.1.95:5000/offbeat-iot/portainer-mcp:latest
    dynamic:
      tools: true
    tools:
      - name: ListEnvironments
      - name: ListStacks
      - name: GetStackFile
      - name: CreateStack
      - name: UpdateStack
      - name: DockerProxy
      - name: KubernetesProxy
      - name: ListLocalStacks
    prompts: 0
    resources: {}
    env:
      - name: PORTAINER_SERVER
        value: http://build1.home:6500
    secrets:
      - name: portainer_build1.token
        env: PORTAINER_TOKEN
        description: Portainer API token

